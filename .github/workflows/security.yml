name: Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9am UTC

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt
